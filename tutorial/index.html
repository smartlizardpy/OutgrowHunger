<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial | Outgrow Hunger</title>
    <style>
        :root {
            --primary: #4a7c59;
            --bg: #f4f1ea;
            --text: #333;
            --card: #fff;
            --radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100dvh;
            background: var(--bg);
            background-image: radial-gradient(#e0e5e0 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: min(640px, 100%);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            margin-bottom: 12px;
        }

        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: var(--primary);
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Tutorial</h1>
        <p>Something great will happen... for now.</p>
        <a href="/game.html">Back to Game</a>
    </main>
</body>
</html>
