<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | The Last Harvest</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KMJVKTWKR2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KMJVKTWKR2');
    </script>
    <style>
        :root {
            --primary-color: #4a7c59;
            --primary-dark: #3a6346;
            --secondary-color: #8cba80;
            --accent-color: #e6b89c;
            --danger-color: #d9534f;
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --text-color: #333;
            --radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100dvh;
            background-color: var(--bg-color);
            background-image: radial-gradient(#e0e5e0 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .feedback-card {
            width: min(560px, 100%);
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
        }

        h1 {
            color: var(--primary-color);
            font-size: clamp(1.6rem, 2.5vw, 2rem);
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 6px;
        }

        input[type="email"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        input[type="email"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .field { margin-bottom: 18px; }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { background: #aaa; cursor: default; transform: none; }

        .btn-back {
            background: none;
            color: var(--primary-color);
            font-size: 0.9rem;
            margin-top: 12px;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 10px;
        }
        .btn-back:hover { text-decoration: underline; }

        #feedback-status {
            text-align: center;
            margin-top: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
        }
        #feedback-status.success { color: var(--primary-color); }
        #feedback-status.error { color: var(--danger-color); }

        #success-view {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        #success-view .check { font-size: 4rem; margin-bottom: 12px; }
        #success-view h2 { color: var(--primary-color); margin-bottom: 8px; }
        #success-view p { color: #666; margin-bottom: 24px; }

        .star-rating {
            display: flex;
            justify-content: center;
            gap: 8px;
            direction: rtl;
        }
        .star-rating input { display: none; }
        .star-rating label {
            font-size: 2.2rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.15s, transform 0.15s;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #f0ad4e;
        }
        .star-rating label:hover { transform: scale(1.15); }

        .site-credit {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="feedback-card">
    <div id="form-view">
        <h1>Share Your Feedback</h1>
        <p class="subtitle">Help us improve The Last Harvest</p>

        <div class="field">
            <label>How would you rate the game?</label>
            <div class="star-rating">
                <input type="radio" name="rating" id="star5" value="5"><label for="star5">&#9733;</label>
                <input type="radio" name="rating" id="star4" value="4"><label for="star4">&#9733;</label>
                <input type="radio" name="rating" id="star3" value="3"><label for="star3">&#9733;</label>
                <input type="radio" name="rating" id="star2" value="2"><label for="star2">&#9733;</label>
                <input type="radio" name="rating" id="star1" value="1"><label for="star1">&#9733;</label>
            </div>
        </div>

        <div class="field">
            <label for="feedback-email">Email <span style="font-weight:400;color:#999;">(optional)</span></label>
            <input type="email" id="feedback-email" placeholder="you@example.com">
        </div>

        <div class="field">
            <label for="feedback-text">Your Feedback</label>
            <textarea id="feedback-text" placeholder="What did you enjoy? What could be better?"></textarea>
        </div>

        <button class="btn btn-primary" id="btn-submit">Submit Feedback</button>
        <p id="feedback-status"></p>
    </div>

    <div id="success-view">
        <div class="check">&#10003;</div>
        <h2>Thank You!</h2>
        <p>Your feedback has been submitted. We appreciate you helping us improve the game.</p>
        <a href="/game.html" class="btn btn-primary">Back to Game</a>
    </div>

    <a href="/game.html" class="btn-back" id="back-link">&larr; Back to Game</a>
    <p class="site-credit">Copyright &copy; Made by Ate&#351; Demir, Ozan Kaygusuz, and Sohan</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDf5oEPhp0iU6XhyltcWu76yvv_5CDmBE4",
        authDomain: "outgrow-hunger.firebaseapp.com",
        projectId: "outgrow-hunger",
        storageBucket: "outgrow-hunger.firebasestorage.app",
        messagingSenderId: "758944974234",
        appId: "1:758944974234:web:caaba62319c491ec512623",
        measurementId: "G-KMJVKTWKR2"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    const btnSubmit = document.getElementById('btn-submit');
    const statusEl = document.getElementById('feedback-status');

    btnSubmit.addEventListener('click', async () => {
        const text = document.getElementById('feedback-text').value.trim();
        const email = document.getElementById('feedback-email').value.trim();
        const ratingEl = document.querySelector('input[name="rating"]:checked');
        const rating = ratingEl ? parseInt(ratingEl.value) : null;

        if (!text) {
            statusEl.innerText = 'Please write some feedback before submitting.';
            statusEl.className = 'error';
            statusEl.style.display = 'block';
            return;
        }

        btnSubmit.disabled = true;
        btnSubmit.innerText = 'Submitting...';
        statusEl.style.display = 'none';

        try {
            await addDoc(collection(db, 'feedback'), {
                rating: rating,
                email: email || null,
                text: text,
                timestamp: serverTimestamp()
            });

            document.getElementById('form-view').style.display = 'none';
            document.getElementById('back-link').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
        } catch (err) {
            console.error('Feedback submission failed:', err);
            btnSubmit.disabled = false;
            btnSubmit.innerText = 'Submit Feedback';
            statusEl.innerText = 'Something went wrong. Please try again.';
            statusEl.className = 'error';
            statusEl.style.display = 'block';
        }
    });
</script>

</body>
</html>
